<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunshard Siege</title>
    <link rel="stylesheet" href="/client/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">Multiplayer Action Roguelite</p>
        <h1>Sunshard Siege</h1>
        <p class="brand-copy">Defend the relic, chain enemies with radiant tethers, and draft blessings between waves.</p>
      </div>

      <div class="topbar-actions">
        <label class="field inline-field">
          <span>Warden</span>
          <input id="nickname-input" maxlength="18" placeholder="Your name" />
        </label>
        <label class="field inline-field">
          <span>Room</span>
          <input id="room-code-input" maxlength="4" placeholder="AB23" />
        </label>
        <div class="button-row top-buttons">
          <button id="create-room-button" class="action-button primary">Create</button>
          <button id="join-room-button" class="action-button">Join</button>
          <button id="ready-button" class="action-button">Ready</button>
          <button id="leave-room-button" class="action-button danger">Leave</button>
          <button id="copy-invite-button" class="action-button">Copy Invite</button>
        </div>
        <div class="topbar-status">
          <span id="connection-badge" class="connection-badge" data-state="connecting">Connecting</span>
          <span id="status-line" class="status-line"></span>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="stage-card">
        <canvas id="game-canvas"></canvas>
        <div id="hud-top" class="hud-top"></div>
        <div id="phase-overlay" class="phase-overlay"></div>
        <div id="upgrade-overlay" class="upgrade-overlay hidden"></div>
        <div id="ability-bar" class="ability-bar"></div>
      </section>

      <aside class="sidebar">
        <section id="session-panel" class="panel"></section>
        <section id="roster-panel" class="panel"></section>
        <section id="info-panel" class="panel"></section>
      </aside>
    </main>

    <script type="module" src="/client/main.js"></script>
  </body>
</html>
